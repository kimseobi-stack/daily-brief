name: Daily Brief

on:
  schedule:
    # KST 07:00 = UTC 22:00 (전날) / KST 17:00 = UTC 08:00
    - cron: "0 22 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests yfinance pandas numpy

      - name: Run brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
          KIWOOM_APPKEY: ${{ secrets.KIWOOM_APPKEY }}
          KIWOOM_APPSECRET: ${{ secrets.KIWOOM_APPSECRET }}
          KIWOOM_ACCOUNT: ${{ secrets.KIWOOM_ACCOUNT }}
          KIWOOM_BASE: ${{ secrets.KIWOOM_BASE }}
        working-directory: scripts
        run: python daily_brief.py
